#Spring config properties
//configuracao que permite que o java leia o arquivo .env

spring.config.import=optional:file:.env[.properties]


spring.application.name=DevTracker
spring.datasource.driver-class-name=org.postgresql.Driver
#KEYS POSTGRES CONFIG
spring.datasource.url=jdbc:postgresql://localhost:${KEY_POSTGRES_PORT}/${KEY_POSTGRES_NAME}
spring.datasource.username=${KEY_POSTGRES_USER}
spring.datasource.password=${KEY_POSTGRES_PASSWORD}
# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.security=DEBUG